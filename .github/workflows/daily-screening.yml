name: Daily Stock Screening and Dashboard Deployment

on:
  schedule:
    # Dual-cron for DST-aware 1:30 PM Pacific (Mon-Fri)
    # 8:30 PM UTC = 1:30 PM PDT (Mar-Nov)
    - cron: '30 20 * * 1-5'
    # 9:30 PM UTC = 1:30 PM PST (Nov-Mar)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual triggering (always runs)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-screening"
  cancel-in-progress: false

jobs:
  run-screening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Keep both UTC crons, then allow only the one that matches the current
      # Pacific offset. This is more reliable than checking the runner clock
      # because scheduled workflows can start late.
      - name: Schedule guard - verify Pacific DST mapping
        id: schedule-guard
        env:
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 -m src.ci.daily_screening_schedule_guard

      - name: Set up Python
        if: steps.schedule-guard.outputs.should_run == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        if: steps.schedule-guard.outputs.should_run == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Run daily workflow
        if: steps.schedule-guard.outputs.should_run == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python run_daily_workflow.py

      - name: Export dashboard data
        if: steps.schedule-guard.outputs.should_run == 'true'
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PYTHONPATH: .
        run: |
          python src/reporting/export_dashboard_data.py

      - name: Run EP Scanner export (AMC earnings after-hours)
        if: steps.schedule-guard.outputs.should_run == 'true'
        env:
          PYTHONPATH: .
        run: |
          python src/reporting/ep_scan_export.py || echo "EP scan failed or no qualifying tickers - continuing"

      - name: Commit and push results
        if: steps.schedule-guard.outputs.should_run == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add reports/ data/ logs/ docs/data/
          git add -f screening_output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily report $(date +'%Y-%m-%d')"
            git push origin HEAD:${BRANCH_NAME}
          fi

      - name: Upload report as artifact
        if: always() && steps.schedule-guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Upload screening outputs as artifact
        if: always() && steps.schedule-guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screening-outputs-${{ github.run_number }}
          path: screening_output/consolidated/*.txt
          retention-days: 30

      - name: Notify on failure
        if: failure() && steps.schedule-guard.outputs.should_run == 'true'
        run: |
          echo "::error::Daily workflow failed! Check logs for details."

  # Deploy dashboard to GitHub Pages after successful screening
  deploy-pages:
    needs: run-screening
    if: always() && needs.run-screening.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull latest commit (which includes the data just pushed)
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
