name: EP Scan — Afternoon (AMC Earnings)

on:
  schedule:
    # Dual-cron for DST-aware 2:00 PM Pacific (Mon-Thu, no Friday AMC)
    # 9:00 PM UTC = 2:00 PM PDT (Mar-Nov)
    - cron: '0 21 * * 1-4'
    # 10:00 PM UTC = 2:00 PM PST (Nov-Mar)
    - cron: '0 22 * * 1-4'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "ep-scan-afternoon"
  cancel-in-progress: false

jobs:
  ep-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Schedule guard
        id: schedule-guard
        env:
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_EVENT_SCHEDULE: ${{ github.event.schedule }}
          SCHEDULE_GUARD_PDT_CRON: "0 21 * * 1-4"
          SCHEDULE_GUARD_PST_CRON: "0 22 * * 1-4"
        run: |
          python3 -m src.ci.daily_screening_schedule_guard

      - name: Set up Python
        if: steps.schedule-guard.outputs.should_run == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.schedule-guard.outputs.should_run == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run afternoon EP scan
        if: steps.schedule-guard.outputs.should_run == 'true'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          DISCORD_EP_SCAN_WEBHOOK_URL: ${{ secrets.DISCORD_EP_SCAN_WEBHOOK_URL }}
          PYTHONPATH: .
        run: |
          python src/reporting/ep_scan_afternoon.py || echo "EP scan failed - continuing"

      - name: Commit and push results
        if: steps.schedule-guard.outputs.should_run == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs/data/ep_scan_afternoon.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "EP scan afternoon $(date +'%Y-%m-%d')"
            max_attempts=3
            attempt=1
            while [ "${attempt}" -le "${max_attempts}" ]; do
              git fetch origin "${BRANCH_NAME}"
              if ! git rebase "origin/${BRANCH_NAME}"; then
                git rebase --abort || true
                echo "::error::Rebase failed."
                exit 1
              fi
              if git push origin HEAD:${BRANCH_NAME}; then
                break
              fi
              if [ "${attempt}" -eq "${max_attempts}" ]; then
                echo "::error::Push failed after ${max_attempts} attempts."
                exit 1
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
          fi

  deploy-pages:
    needs: ep-scan
    if: always() && needs.ep-scan.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      - id: deployment
        uses: actions/deploy-pages@v4
