# Stock Themes Workflow Configuration

# Data fetching
price_data:
  lookback_days: 500

fundamental_data:
  cache_days: 7
  rate_limit_seconds: 2
  max_retries: 3
  database_path: "data/fundamentals.db"

# RS calculation
rs_score:
  lookback_days: 27
  benchmark_ticker: SPY

# LLM settings (Gemini 3 Flash Preview)
llm:
  provider: gemini
  model: gemini-3-flash-preview
  api_key_env: GOOGLE_API_KEY
  max_tokens: 8192
  temperature: 0.3
  thinking_level: 1

# Market breadth
market_breadth:
  ncfd_url: "https://www.barchart.com/stocks/quotes/$NCFD/overview"
  mmfi_url: "https://www.barchart.com/stocks/quotes/$MMFI/overview"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

themes:
  metadata_file: "data/ticker_themes.json"
  company_metadata_file: "data/ticker_company_metadata.json"
  review_state_file: "data/theme_review_state.json"
  google_sheet_gid: "2036042729"
  llm_batch_size: 50
  validation_batch_size: 60
  company_metadata_cache_days: 90
  validation_stale_days: 30
  validation_confirmation_threshold: 2
  dashboard_theme_limit: 30
  dashboard_tickers_per_theme: 10
  min_stocks_per_theme: 3
  hot_theme_rs_threshold: 70.0
  high_momentum_threshold: 80.0
  min_scored_breadth: 2

  # Scoring formula (backtested & validated)
  scoring:
    max_scoring_tickers: 10
    leader_rs_threshold: 80
    near_highs_column: "max60"
    strength_components:
      median_rs: 0.40
      leader_pct: 0.35
      participation: 0.25
    extension_sigmoid:
      midpoint: 15
      steepness: 5
    breadth_penalty_two: 0.75
    enrichment:
      coeff: 0.08
      max: 1.35
    short_interest:
      max_breadth: 6
      min_si: 0.07
      coeff: 2.5
      max_bonus: 0.45
    theme_groups_file: "config/theme_groups.yaml"

  # 4-tier regime from master table pct_above_50sma
  regime:
    source: "master_table"
    thresholds:
      strong_bull: 60
      bull: 40
      choppy: 25
    weights:
      strong_bull: {strength: 0.50, confirmation: 0.50}
      bull: {strength: 0.50, confirmation: 0.50}
      choppy: {strength: 0.70, confirmation: 0.30}
      bear: {strength: 0.80, confirmation: 0.20}


# Dashboard data sources (Google Sheets)
dashboard:
  etf_sheet_gid: "1565194920"
  industry_etf_sheet_gid: "549753148"

# Report settings
report:
  output_dir: "reports"
  include_charts: false
  email_report: false

# Screeners to run
screeners:
  - steady_trend
  - topdog
  - gamma
  - htf
  - darvas

# Logging
logging:
  level: INFO
  dir: "logs"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
